services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: football_picks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_picks"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/football_picks
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DATA_PROVIDER: ${DATA_PROVIDER:-mock}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      FLASHSCORE_RAPIDAPI_HOST: ${FLASHSCORE_RAPIDAPI_HOST:-flashscore4.p.rapidapi.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Madrid}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python scripts.py init-db && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
